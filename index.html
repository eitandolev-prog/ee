<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Bear Island</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
  background:#222;
  color:white;
  text-align:center;
}

#lobby{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#111;
}

button{
  padding:20px;
  font-size:25px;
  border:none;
  border-radius:10px;
  background:#27ae60;
  color:white;
  cursor:pointer;
}

canvas{
  display:none;
  background:#27ae60;
}
</style>
</head>

<body>

<div id="lobby">
  <h1>SUPER BEAR ISLAND</h1>
  <button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameActive = false;

function startGame(){
  gameActive = true;

  document.getElementById("lobby").style.display = "none";
  canvas.style.display = "block";

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  draw();
}

function draw(){
  if(!gameActive) return;

  ctx.clearRect(0,0,canvas.width,canvas.height);


  requestAnimationFrame(draw);
}
</script>

</body>
</html>
