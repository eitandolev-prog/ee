<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Bear Island</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:#111;
  font-family:Arial;
  color:white;
  text-align:center;
}

#lobby{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:#151526;
}

button{
  padding:18px 40px;
  font-size:25px;
  border:none;
  border-radius:12px;
  background:#27ae60;
  color:white;
  cursor:pointer;
}

input{
  padding:12px;
  font-size:18px;
  border-radius:8px;
  border:none;
  margin:10px;
  text-align:center;
}

canvas{
  display:none;
  background:#67aa5d;
}
</style>
</head>

<body>

<div id="lobby">
  <h1>SUPER BEAR ISLAND</h1>

  <input id="nameInput" placeholder="Enter name">

  <h3 id="savedName"></h3>

  <button onclick="startGame()">START</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let gameActive = false;
let keys = {};

let player = {
  name: localStorage.getItem("playerName") || "",
  x:300,
  y:300,
  speed:5,
  emoji:"👦"
};

let wolves = [];

// אם כבר יש שם
if(player.name){
  document.getElementById("nameInput").style.display="none";
  document.getElementById("savedName").innerText = "Player: " + player.name;
}

// START
function startGame(){

  const input = document.getElementById("nameInput");

  // שמירת שם פעם אחת
  if(!player.name){
    player.name = input.value.trim() || "Player";
    localStorage.setItem("playerName", player.name);
  }

  // אדמין
  if(player.name === "Eitan1114"){
    player.speed = 10;
    player.emoji = "🦸‍♂️";
  }

  // מעבר למשחק
  document.getElementById("lobby").style.display="none";
  canvas.style.display="block";

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  player.x = canvas.width/2;
  player.y = canvas.height/2;

  wolves = [];

  for(let i=0;i<6;i++){
    wolves.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      speed:2
    });
  }

  gameActive = true;
  gameLoop();
}

// חזרה ללובי
function backToLobby(msg){
  gameActive = false;
  if(msg) alert(msg);

  canvas.style.display="none";
  document.getElementById("lobby").style.display="flex";

  // לא חוזר לשם
  document.getElementById("nameInput").style.display="none";
  document.getElementById("savedName").innerText = "Player: " + player.name;
}

// תנועה
window.addEventListener("keydown", e=>keys[e.code]=true);
window.addEventListener("keyup", e=>keys[e.code]=false);

// לולאת משחק
function gameLoop(){
  if(!gameActive) return;

  if(keys["ArrowUp"] || keys["KeyW"]) player.y -= player.speed;
  if(keys["ArrowDown"] || keys["KeyS"]) player.y += player.speed;
  if(keys["ArrowLeft"] || keys["KeyA"]) player.x -= player.speed;
  if(keys["ArrowRight"] || keys["KeyD"]) player.x += player.speed;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  // שחקן
  ctx.font="50px Arial";
  ctx.fillText(player.emoji, player.x, player.y);

  // זאבים
  wolves.forEach(wolf=>{
    let angle = Math.atan2(player.y - wolf.y, player.x - wolf.x);

    wolf.x += Math.cos(angle)*wolf.speed;
    wolf.y += Math.sin(angle)*wolf.speed;

    ctx.fillText("🐺", wolf.x, wolf.y);

    // פגיעה = הפסד
    if(Math.hypot(player.x - wolf.x, player.y - wolf.y) < 40){
      backToLobby("Game Over! 🐺");
    }
  });

  requestAnimationFrame(gameLoop);
}
</script>

</body>
</html>
