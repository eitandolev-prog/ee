<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Super Bear Island</title>
<style>
:root{--gold:#f1c40f;--orange:#e67e22;--dark:#1a1a2e}
body{margin:0;overflow:hidden;background:var(--dark);font-family:Arial Black,Arial,sans-serif;touch-action:none;color:white;text-align:center}
canvas{display:none;background:#27ae60;cursor:crosshair}
#lobby-screen{position:fixed;inset:0;background:radial-gradient(circle,#1a1a2e,#000);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;z-index:500}
.stat-badge{background:rgba(0,0,0,.8);padding:10px 20px;border-radius:30px;border:2px solid var(--gold);font-size:20px;margin:5px}
.btn{padding:15px 35px;font-size:22px;border-radius:15px;border:none;cursor:pointer;font-weight:bold;background:#27ae60;color:white}
#shop-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;color:#333;padding:25px;border-radius:20px;display:none;z-index:1000;width:300px;border:5px solid var(--orange)}
#game-ui{position:fixed;top:10px;width:100%;display:none;flex-wrap:wrap;justify-content:center;z-index:20;pointer-events:none}
#attackBtn{display:none;position:fixed;right:25px;bottom:35px;z-index:999;padding:18px;border-radius:15px;background:#ff4757;color:white;font-weight:bold;border:none}
</style>
</head>
<body>

  <button class="btn" onclick="confirmName()">START</button>
<div id="lobby-screen">
  <h1 style="color:var(--gold)">SUPER BEAR ISLAND</h1>
  <h2>Tip: Double click the bear to unlock bazooka</h2>

  <div>
    <span class="stat-badge">💰 $<span id="lobby-money">0</span></span>
    <span class="stat-badge">⚡ Speed: <span id="lobby-speed">4.0</span></span>
    <span class="stat-badge">🔥 Level: <span id="lobby-level">1</span></span>
    <span class="stat-badge">🏆 Best: <span id="best-time">---</span></span>
  </div>

  <div id="name-box">
    <input id="username-input" placeholder="Enter player name..." style="padding:12px;border-radius:8px;border:none;text-align:center;font-size:18px">
    <br><br>
    <button class="btn" onclick="confirmName()">START</button>
  </div>

  <div id="lobby-main" style="display:none">
    <h2 id="player-name-display"></h2>
    <div id="lobby-char" style="font-size:90px">👦</div>
    <button class="btn" onclick="toggleShop()" style="background:var(--orange)">🛒 Shop</button>
    <button class="btn" onclick="startMatch()">PLAY</button>
  </div>
</div>

<div id="shop-modal">
  <h3>Warrior Upgrades</h3>
  <p>Speed upgrade: <b>$150</b></p>
  <button onclick="buyUpgrade()" style="padding:10px;background:var(--orange);color:white;border:none;border-radius:5px;width:100%">Buy Upgrade</button>
  <br><br>
  <button onclick="toggleShop()">Close</button>
</div>

<div id="game-ui">
  <div class="stat-badge">💰 $<span id="ingame-money">0</span></div>
  <div class="stat-badge">❤️ HP: <span id="hp-ui">100</span></div>
  <div class="stat-badge">⏱ <span id="timer-ui">0.0</span>s</div>
  <div class="stat-badge">Enemies: <span id="enemies-left">0</span></div>
</div>

<button id="attackBtn" onclick="normalAttack()">ATTACK</button>
<canvas id="gameCanvas"></canvas>

  }

  document.getElementById("player-name-display").innerText = playerProfile.name;
  document.getElementById("lobby-char").innerText = playerProfile.char;
